name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ans
          POSTGRES_PASSWORD: ans
          POSTGRES_DB: ans_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ans:ans@127.0.0.1:5432/ans_test
      MEDIA_UPLOAD_DIR: ${{ runner.temp }}/media
      OBS_HOST: 127.0.0.1
      OBS_PORT: 4455
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build -w @ans/database
      - run: npm run db:migrate
      - run: npm run ci
      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            test-results/**
            playwright-report/**
            logs/**
            ${{ runner.temp }}/media/**
