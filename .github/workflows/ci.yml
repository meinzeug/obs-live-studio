name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ans
          POSTGRES_PASSWORD: ans
          POSTGRES_DB: ans_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ans:ans@postgres:5432/ans_test
      MEDIA_UPLOAD_DIR: ${{ runner.temp }}/media
      OBS_HOST: 127.0.0.1
      OBS_PORT: 4455
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE=$(node -e "const { chromium } = require('@playwright/test'); console.log(chromium.executablePath())")" >> "$GITHUB_ENV"
      - run: npm run build -w @ans/database
      - run: npm run db:migrate
      - name: Start runtime services
        run: |
          mkdir -p logs
          npm run obs:mock > logs/obs-mock.log 2>&1 &
          npm run start -w @ans/api > logs/api.log 2>&1 &
          npm run start -w @ans/web > logs/web.log 2>&1 &
          npm run start -w @ans/broadcast-runner > logs/broadcast-runner.log 2>&1 &
          node -e "const urls=['http://127.0.0.1:12000/health','http://127.0.0.1:12001']; let tries=0; const wait=ms=>new Promise(r=>setTimeout(r,ms)); (async()=>{for(const url of urls){for(tries=0;tries<120;tries++){try{const r=await fetch(url); if(r.ok) break;}catch{} await wait(1000)} if(tries>=120) throw new Error('not ready '+url)}})()"
      - run: npm run ci
      - name: Upload E2E diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            test-results/**
            playwright-report/**
            logs/**
            ${{ runner.temp }}/media/**
