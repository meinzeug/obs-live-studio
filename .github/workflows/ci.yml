name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ans
          POSTGRES_PASSWORD: ans
          POSTGRES_DB: ans_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ans:ans@postgres:5432/ans_test
      MEDIA_UPLOAD_DIR: ${{ runner.temp }}/media
      TTS_ENGINE: espeak
      OBS_HOST: 127.0.0.1
      OBS_PORT: 4455
      OBS_MOCK_STATUS_PORT: 4456
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:12001
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: |
          node - <<'NODE' >> "$GITHUB_ENV"
          const { chromium } = require('@playwright/test');
          console.log(`PLAYWRIGHT_CHROMIUM_EXECUTABLE=${chromium.executablePath()}`);
          NODE
      - run: npm run ci
      - name: Dump broadcast tables
        if: failure()
        run: |
          pg_dump "$DATABASE_URL" --data-only --table='broadcast_*' --table='playback_state' --table='live_events' > logs/broadcast-tables.sql || true
      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: |
            test-results/**
            playwright-report/**
            logs/**
            ${{ runner.temp }}/media/**
