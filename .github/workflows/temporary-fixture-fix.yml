name: Temporary Fixture Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/diagnose-actions-startup' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: PR-Branch auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Broadcast-Fixture um lokales Video ergänzen
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tests/helpers/broadcast-fixtures.ts')
          lines = path.read_text().splitlines()

          def unique_index(predicate, label):
              matches = [index for index, line in enumerate(lines) if predicate(line)]
              if len(matches) != 1:
                  raise SystemExit(f'{label}: {len(matches)} Treffer')
              return matches[0]

          persisted_index = unique_index(lambda line: line == '  if (articles.length) {', 'Persistenzanker')
          lines[persisted_index + 1:persisted_index + 1] = [
              '    const visualMedia = (',
              '      await client.query(`select distinct media_id id from media_links where article_id=any($1::uuid[])`, [articles])',
              '    ).rows.map((row: { id: string }) => row.id);',
              "    await client.query('delete from media_links where article_id=any($1::uuid[])', [articles]);",
              "    await client.query('delete from article_media_candidates where article_id=any($1::uuid[])', [articles]);",
              "    await client.query(`delete from worker_jobs where payload->>'articleId'=any($1::text[])`, [articles]);",
          ]

          article_delete_index = unique_index(
              lambda line: line.strip() == "await client.query('delete from articles where id=any($1::uuid[])', [articles]);",
              'Artikellöschanker',
          )
          lines[article_delete_index:article_delete_index] = [
              '    if (visualMedia.length)',
              "      await client.query('delete from media_assets where id=any($1::uuid[])', [visualMedia]);",
          ]

          explicit_index = unique_index(
              lambda line: "delete from scripts where id=any($1::uuid[])" in line and 'fixture.scriptIds' in line,
              'Expliziter Bereinigungsanker',
          )
          lines[explicit_index:explicit_index] = [
              "      await client.query('delete from media_links where article_id=any($1::uuid[])', [fixture.articleIds]);",
              "      await client.query('delete from article_media_candidates where article_id=any($1::uuid[])', [fixture.articleIds]);",
              "      await client.query(`delete from worker_jobs where payload->>'articleId'=any($1::text[])`, [fixture.articleIds]);",
          ]

          item_index = unique_index(lambda line: line == '    const item = (', 'Broadcast-Item-Anker')
          lines[item_index:item_index] = [
              '    const videoFile = join(mediaDir, `${title}.mp4`);',
              "    const videoBytes = Buffer.from('obs-live-studio fixture video');",
              '    await writeFile(videoFile, videoBytes);',
              '    mediaFiles.push(videoFile);',
              '    const videoMedia = (',
              '      await query(',
              '        `insert into media_assets(',
              '           filename,mime_type,size_bytes,duration_seconds,usage,source,storage_path,sha256,media_kind,provider,provider_asset_id',
              "         ) values($1,'video/mp4',$2,$3,'article-video',$4,$1,$5,'video','fixture',$6) returning id`,",
              '        [',
              '          videoFile,',
              '          videoBytes.length,',
              '          opts.durationSeconds,',
              '          opts.scope,',
              "          createHash('sha256').update(videoBytes).update(title).digest('hex'),",
              '          `${suffix}-${i}`,',
              '        ],',
              '      )',
              '    ).rows[0];',
              '    mediaIds.push(videoMedia.id);',
              '    await query("insert into media_links(media_id,article_id,purpose) values($1,$2,\'article-video\')", [',
              '      videoMedia.id,',
              '      article.id,',
              '    ]);',
          ]

          path.write_text('\n'.join(lines) + '\n')
          PY
          npx prettier --write tests/helpers/broadcast-fixtures.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/helpers/broadcast-fixtures.ts
          git commit -m "Add required video to broadcast fixtures"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
