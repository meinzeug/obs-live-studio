name: Temporary Fixture Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/diagnose-actions-startup' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: PR-Branch auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Broadcast-Fixture um lokales Video ergänzen
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tests/helpers/broadcast-fixtures.ts')
          content = path.read_text()

          old_persisted = """  if (articles.length) {
            const scripts = (
              await client.query(`select id from scripts where article_id=any($1::uuid[])`, [articles])
            ).rows.map((row: { id: string }) => row.id);"""
          new_persisted = """  if (articles.length) {
            const visualMedia = (
              await client.query(`select distinct media_id id from media_links where article_id=any($1::uuid[])`, [articles])
            ).rows.map((row: { id: string }) => row.id);
            await client.query('delete from media_links where article_id=any($1::uuid[])', [articles]);
            await client.query('delete from article_media_candidates where article_id=any($1::uuid[])', [articles]);
            await client.query(`delete from worker_jobs where payload->>'articleId'=any($1::text[])`, [articles]);
            const scripts = (
              await client.query(`select id from scripts where article_id=any($1::uuid[])`, [articles])
            ).rows.map((row: { id: string }) => row.id);"""
          if old_persisted not in content:
              raise SystemExit('Persistierte Fixture-Bereinigung wurde nicht gefunden')
          content = content.replace(old_persisted, new_persisted, 1)

          old_article_delete = """      await client.query('delete from scripts where id=any($1::uuid[])', [scripts]);
            }
            await client.query('delete from articles where id=any($1::uuid[])', [articles]);"""
          new_article_delete = """      await client.query('delete from scripts where id=any($1::uuid[])', [scripts]);
            }
            if (visualMedia.length) await client.query('delete from media_assets where id=any($1::uuid[])', [visualMedia]);
            await client.query('delete from articles where id=any($1::uuid[])', [articles]);"""
          if old_article_delete not in content:
              raise SystemExit('Persistierte Artikelbereinigung wurde nicht gefunden')
          content = content.replace(old_article_delete, new_article_delete, 1)

          old_explicit = """      await client.query('delete from audio_assets where id=any($1::uuid[])', [fixture.audioAssetIds]);
            await client.query('delete from broadcast_items where id=any($1::uuid[])', [fixture.itemIds]);
            await client.query('delete from scripts where id=any($1::uuid[])', [fixture.scriptIds]);
            await client.query('delete from media_assets where id=any($1::uuid[])', [fixture.mediaIds]);"""
          new_explicit = """      await client.query('delete from audio_assets where id=any($1::uuid[])', [fixture.audioAssetIds]);
            await client.query('delete from broadcast_items where id=any($1::uuid[])', [fixture.itemIds]);
            await client.query('delete from media_links where article_id=any($1::uuid[])', [fixture.articleIds]);
            await client.query('delete from article_media_candidates where article_id=any($1::uuid[])', [fixture.articleIds]);
            await client.query(`delete from worker_jobs where payload->>'articleId'=any($1::text[])`, [fixture.articleIds]);
            await client.query('delete from scripts where id=any($1::uuid[])', [fixture.scriptIds]);
            await client.query('delete from media_assets where id=any($1::uuid[])', [fixture.mediaIds]);"""
          if old_explicit not in content:
              raise SystemExit('Explizite Fixture-Bereinigung wurde nicht gefunden')
          content = content.replace(old_explicit, new_explicit, 1)

          old_item = """    const item = (
              await query(
                `insert into broadcast_items(playlist_id,article_id,position,status,rules) values($1,$2,$3,'planned','{}') returning id`,
                [playlist.id, article.id, i],
              )
            ).rows[0];"""
          new_item = """    const videoFile = join(mediaDir, `${title}.mp4`);
            const videoBytes = Buffer.from('obs-live-studio fixture video');
            await writeFile(videoFile, videoBytes);
            mediaFiles.push(videoFile);
            const videoMedia = (
              await query(
                `insert into media_assets(
                   filename,mime_type,size_bytes,duration_seconds,usage,source,storage_path,sha256,media_kind,provider,provider_asset_id
                 ) values($1,'video/mp4',$2,$3,'article-video',$4,$1,$5,'video','fixture',$6) returning id`,
                [
                  videoFile,
                  videoBytes.length,
                  opts.durationSeconds,
                  opts.scope,
                  createHash('sha256').update(videoBytes).update(title).digest('hex'),
                  `${suffix}-${i}`,
                ],
              )
            ).rows[0];
            mediaIds.push(videoMedia.id);
            await query("insert into media_links(media_id,article_id,purpose) values($1,$2,'article-video')", [
              videoMedia.id,
              article.id,
            ]);
            const item = (
              await query(
                `insert into broadcast_items(playlist_id,article_id,position,status,rules) values($1,$2,$3,'planned','{}') returning id`,
                [playlist.id, article.id, i],
              )
            ).rows[0];"""
          if old_item not in content:
              raise SystemExit('Broadcast-Item-Erstellung wurde nicht gefunden')
          content = content.replace(old_item, new_item, 1)

          path.write_text(content)
          PY
          npx prettier --write tests/helpers/broadcast-fixtures.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/helpers/broadcast-fixtures.ts
          git commit -m "Add required video to broadcast fixtures"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
