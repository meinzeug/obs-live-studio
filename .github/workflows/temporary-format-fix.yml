name: Temporary Format Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/diagnose-actions-startup' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: PR-Branch auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci --no-audit --no-fund

      - name: Repository formatieren und Quellcode zurückschreiben
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p formatter-output/workflows
          npm run format 2>&1 | tee formatter-output/format-run.log
          cp .github/workflows/*.yml formatter-output/workflows/
          git restore --source=HEAD -- .github/workflows
          if git diff --quiet; then
            echo "Keine Quellcode-Formatierungsänderungen erforderlich."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Format repository with Prettier"
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Formatierte Workflow-Dateien hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formatted-workflows
          path: formatter-output/**
          if-no-files-found: error
          retention-days: 1
