name: Temporary OBS E2E Fix

on:
  pull_request:
    types: [reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/diagnose-actions-startup' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: PR-Branch auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: OBS-Abschluss und E2E-Erwartungen korrigieren
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          controller = Path('packages/obs-controller/src/index.ts')
          source = controller.read_text()
          old_stop = """    if (inputName === VOICE_INPUT && this.articleVideoActive)
                await this.call('TriggerMediaInputAction', {
                  inputName: ARTICLE_VIDEO_INPUT,
                  mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_STOP',
                }).catch(() => undefined);
              return result;"""
          new_stop = """    if (inputName === VOICE_INPUT && this.articleVideoActive) {
                await this.call('TriggerMediaInputAction', {
                  inputName: ARTICLE_VIDEO_INPUT,
                  mediaAction: 'OBS_WEBSOCKET_MEDIA_INPUT_ACTION_STOP',
                }).catch(() => undefined);
                this.articleVideoActive = false;
              }
              return result;"""
          if old_stop not in source:
              raise SystemExit('OBS-Stopblock wurde nicht gefunden')
          source = source.replace(old_stop, new_stop, 1)
          old_cleanup = "    if (opts.videoPath) await this.stopMedia(ARTICLE_VIDEO_INPUT).catch(() => undefined);"
          new_cleanup = "    if (opts.videoPath && this.articleVideoActive)\n      await this.stopMedia(ARTICLE_VIDEO_INPUT).catch(() => undefined);"
          if old_cleanup not in source:
              raise SystemExit('OBS-Videoabschluss wurde nicht gefunden')
          controller.write_text(source.replace(old_cleanup, new_cleanup, 1))

          e2e = Path('e2e/broadcast-real.spec.ts')
          source = e2e.read_text()
          import_anchor = "import { hashPassword } from '@ans/security/auth';"
          import_line = "import { ARTICLE_VIDEO_INPUT, VOICE_INPUT } from '@ans/obs-controller';"
          if import_line not in source:
              if import_anchor not in source:
                  raise SystemExit('E2E-Importanker wurde nicht gefunden')
              source = source.replace(import_anchor, import_anchor + '\n' + import_line, 1)

          old_helper = """function obsActions(requests: Array<{ requestType: string; requestData?: any }>) {
            return requests
              .filter((request) => request.requestType === 'TriggerMediaInputAction')
              .map((request) => String(request.requestData?.mediaAction));
          }"""
          new_helper = """function obsActionCount(
            requests: Array<{ requestType: string; requestData?: any }>,
            inputName: string,
            actionSuffix: string,
          ) {
            return requests.filter(
              (request) =>
                request.requestType === 'TriggerMediaInputAction' &&
                request.requestData?.inputName === inputName &&
                String(request.requestData?.mediaAction).endsWith(actionSuffix),
            ).length;
          }"""
          if old_helper not in source:
              raise SystemExit('E2E-Aktionshelfer wurde nicht gefunden')
          source = source.replace(old_helper, new_helper, 1)
          source = source.replace(
              "test('Pause, Resume und Skip erzeugen jeweils exakt eine OBS-Aktion', async ({ page }) => {",
              "test('Pause, Resume und Skip erzeugen je aktivem Eingang exakt eine OBS-Aktion', async ({ page }) => {",
              1,
          )

          replacements = {
            """  await expect
                .poll(async () => obsActions(await obsRequests()).filter((action) => action.endsWith('_PAUSE')).length)
                .toBe(1);""": """  await expect.poll(async () => obsActionCount(await obsRequests(), VOICE_INPUT, '_PAUSE')).toBe(1);
              await expect.poll(async () => obsActionCount(await obsRequests(), ARTICLE_VIDEO_INPUT, '_PAUSE')).toBe(1);""",
            """  await expect
                .poll(async () => obsActions(await obsRequests()).filter((action) => action.endsWith('_PLAY')).length)
                .toBe(1);""": """  await expect.poll(async () => obsActionCount(await obsRequests(), VOICE_INPUT, '_PLAY')).toBe(1);
              await expect.poll(async () => obsActionCount(await obsRequests(), ARTICLE_VIDEO_INPUT, '_PLAY')).toBe(1);""",
            """  await expect
                .poll(async () => obsActions(await obsRequests()).filter((action) => action.endsWith('_STOP')).length)
                .toBe(1);""": """  await expect.poll(async () => obsActionCount(await obsRequests(), VOICE_INPUT, '_STOP')).toBe(1);
              await expect.poll(async () => obsActionCount(await obsRequests(), ARTICLE_VIDEO_INPUT, '_STOP')).toBe(1);""",
          }
          for old, new in replacements.items():
              count = source.count(old)
              if old.endswith(".toBe(1);") and "_STOP" in old:
                  if count != 2:
                      raise SystemExit(f'Unerwartete STOP-Erwartungen: {count}')
                  source = source.replace(old, new)
              else:
                  if count != 1:
                      raise SystemExit(f'E2E-Erwartung nicht eindeutig: {count}')
                  source = source.replace(old, new, 1)
          e2e.write_text(source)
          PY
          npx prettier --write packages/obs-controller/src/index.ts e2e/broadcast-real.spec.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/obs-controller/src/index.ts e2e/broadcast-real.spec.ts
          git commit -m "Avoid duplicate video stop and verify per-input controls"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
