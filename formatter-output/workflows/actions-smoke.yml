name: Actions Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    name: Verify GitHub Actions startup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm runner startup
        shell: bash
        run: |
          set -euo pipefail
          echo "GitHub Actions runner started successfully."
          echo "event=${GITHUB_EVENT_NAME}"
          echo "sha=${GITHUB_SHA}"
